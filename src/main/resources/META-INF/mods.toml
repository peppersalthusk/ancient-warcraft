modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

issueTrackerURL="${mod_issue_tracker_url}"
displayURL="${mod_display_url}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="sword_of_centurion.png"
authors="${mod_authors}"
displayTest="MATCH_VERSION"
description='''Ancient Warcraft - a content mod for Minecraft 1.21.1.

Adds themed swords, soul-related items, and crafting recipes inspired by Nether exploration.

Requires Forge 52.x for Minecraft 1.21.1.'''

[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
